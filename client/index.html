<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 简历智能润色系统</title>

    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --border-color: #333;
            --text-main: #d4d4d4;
            --text-muted: #858585;
            --accent: #007acc;
            --accent-hover: #0098ff;
            --danger: #f44336;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部导航兰 */
        header {
            height: 50px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        header h1 {
            font-size: 16px;
            margin: 0;
            font-weight: 500;
        }

        .header-actions button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: background 0.2s;
        }

        .header-actions button:hover {
            background-color: var(--accent-hover);
        }

        /* 主体三栏布局 */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 50px);
        }

        /* 左侧：AI 交互区 (约30%) */
        .panel-left {
            width: 30%;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-width: 300px;
        }

        /* 中间：预览区 (约50%) */
        .panel-center {
            flex: 1;
            background-color: #fff;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        /* 右侧：模板库区 (约20%) */
        .panel-right {
            width: 20%;
            background-color: var(--bg-panel);
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }

        /* 面板通用标题 */
        .panel-header {
            height: 35px;
            background-color: #2d2d2d;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            user-select: none;
        }

        /* --- 左侧 AI 交互区样式 --- */
        .ai-chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            font-size: 13px;
            line-height: 1.5;
            padding: 10px;
            border-radius: 6px;
            word-wrap: break-word;
        }

        .msg-ai {
            background-color: #37373d;
            border-left: 3px solid var(--accent);
        }

        .msg-user {
            background-color: #2b3a42;
            align-self: flex-end;
            border-right: 3px solid #4caf50;
        }

        .ai-input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-panel);
        }

        textarea {
            width: 100%;
            height: 80px;
            background-color: #1e1e1e;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 4px;
            resize: none;
            font-family: inherit;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        textarea:focus {
            outline: 1px solid var(--accent);
            border-color: transparent;
        }

        .input-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        #loadingSpinner {
            font-size: 12px;
            color: #ffeb3b;
            display: none;
        }

        .btn {
            background-color: #3c3c3c;
            color: var(--text-main);
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn:hover {
            background-color: #4a4a4a;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        /* 建议操作按钮区域 */
        .suggestion-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .suggestion-actions button {
            font-size: 11px;
            padding: 4px 8px;
        }

        /* --- 中间预览区样式 --- */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        /* --- 右侧模板库样式 --- */
        .template-list {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .template-item {
            background-color: #333;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            text-align: center;
            font-size: 13px;
        }

        .template-item:hover {
            border-color: var(--accent);
            background-color: #3a3a3a;
        }

        .upload-area {
            margin-top: 20px;
            padding: 15px;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-btn {
            display: inline-block;
            background-color: #4caf50;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background-color: #45a049;
        }

        /* 隐藏滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
    </style>
</head>

<body>

    <header>
        <h1>AI 简历智能润色系统</h1>
        <div class="header-actions">
            <!-- 历史版本选择下拉框 -->
            <select id="versionSelect"
                style="background:#3c3c3c; color:white; border:none; padding:5px; border-radius:4px; margin-right:10px; outline:none; font-size:12px;">
                <option value="current">当前工作区</option>
            </select>
            <button onclick="saveVersion()">💾 保存版本</button>
            <button onclick="exportHtml()">⬇️ 导出 HTML</button>
        </div>
    </header>

    <div class="main-container">
        <!-- 左侧：AI 助手 (30%) -->
        <div class="panel-left">
            <div class="panel-header">AI 简历专家 (<span id="statusText" style="color:#4caf50; margin-left:5px;">空闲</span>)
            </div>

            <div class="ai-chat-area" id="chatArea">
                <div class="message msg-ai">
                    您好，我是您的专属简历修改专家。请在下方输入您**目标岗位的 JD (岗位描述)**，或者直接告诉我您的**修改诉求**。我会从结构、专业度、匹配度等多个维度为您进行深度诊断，并直接帮您重写内容。
                </div>
            </div>

            <div class="ai-input-area">
                <textarea id="userInput" placeholder="输入岗位JD或您的修改要求..."></textarea>
                <div class="input-actions">
                    <span id="loadingSpinner">思考中...</span>
                    <button class="btn btn-primary" onclick="submitRequest()" id="submitBtn">发送请求 (⮐)</button>
                </div>
            </div>
        </div>

        <!-- 中间：实时预览 (50%) -->
        <div class="panel-center">
            <div class="panel-header" style="background-color: #f3f3f3; color: #333; border-bottom: 1px solid #ccc;">
                简历实时预览 (效果图)
            </div>
            <iframe id="previewFrame"></iframe>
        </div>

        <!-- 右侧：模板库 (20%) -->
        <div class="panel-right">
            <div class="panel-header">模板库</div>
            <div class="template-list">
                <div class="template-item" onclick="loadInitialTemplate()">恢复默认经典模板</div>
            </div>

            <div class="upload-area">
                <label for="uploadTemplate" class="upload-btn">⬆️ 上传本地 HTML 简历</label>
                <input type="file" id="uploadTemplate" accept=".html">
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 8px;">
                    上传您的HTML简历文件，即可在中间实时预览并让AI进行润色修改。
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 全局状态 ---
        window.currentHtmlContent = ''; // 取代原来的 CodeMirror editor 取值
        let currentAiChanges = null; // 暂存AI发来的修改建议

        const previewFrame = document.getElementById('previewFrame');
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const submitBtn = document.getElementById('submitBtn');
        const statusText = document.getElementById('statusText');
        const loadingSpinner = document.getElementById('loadingSpinner');

        // --- 1. 核心渲染逻辑 ---
        function updatePreview() {
            if (!window.currentHtmlContent) return;
            const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
            doc.open();
            doc.write(window.currentHtmlContent);
            doc.close();
            // 每次内容变更存一下临时缓存
            localStorage.setItem('cv_temp_draft', window.currentHtmlContent);
        }

        function setContent(html) {
            window.currentHtmlContent = html;
            updatePreview();
        }

        // --- 2. 模板加载与上传 ---
        async function loadInitialTemplate() {
            // 首先尝试从缓存加载
            const draft = localStorage.getItem('cv_temp_draft');
            if (draft) {
                setContent(draft);
                return;
            }

            // 没有缓存则加载服务器的初始模板
            try {
                const response = await fetch('./initial-template.html');
                if (response.ok) {
                    const html = await response.text();
                    setContent(html);
                    saveVersion('初始版本', html);
                } else {
                    setContent('<!-- 模板加载失败 -->');
                }
            } catch (e) {
                console.error("加载模板失败", e);
                setContent('<h3>模板加载失败，请检查服务状态。</h3>');
            }
        }

        document.getElementById('uploadTemplate').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (evt) {
                setContent(evt.target.result);
                saveVersion('本地上传版', evt.target.result);
                addMessage("✅ 已成功载入您的本地简历模板，现在您可以直接对我提出修改要求了！", true);
            };
            reader.readAsText(file);
            e.target.value = ''; // 清空选中状态，允许重复上传同一文件
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadInitialTemplate();
            loadVersionsMap();
        });

        // --- 3. AI 交互逻辑 ---
        userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitRequest();
            }
        });

        function addMessage(text, isAi = false, actionsHtml = '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isAi ? 'msg-ai' : 'msg-user'}`;
            // 简单处理加粗标记
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            msgDiv.innerHTML = formattedText + actionsHtml;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function submitRequest() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, false);
            userInput.value = '';

            // Fix: UI 状态立即生效
            submitBtn.disabled = true;
            loadingSpinner.style.display = 'inline';
            statusText.innerText = 'AI正在诊断...';
            statusText.style.color = '#ffeb3b';

            try {
                const currentHtml = window.currentHtmlContent;

                const response = await fetch('/api/suggest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userPrompt: text,
                        currentHtml: currentHtml
                    })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();

                currentAiChanges = data.changes;

                const actionHtml = `
                    <div class="suggestion-actions">
                        <button class="btn btn-primary" onclick="applyAiChanges(this)">✓ 同意并自动重写</button>
                        <button class="btn" onclick="addMessage('我不采用这个建议，请重新分析。', false)">✗ 拒绝</button>
                    </div>
                `;

                addMessage(data.suggestion, true, actionHtml);

            } catch (error) {
                console.error("Analysis Error:", error);
                addMessage("❌ 请求失败，大模型接口异常或超时。", true);
            } finally {
                // 回复UI状态
                submitBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                statusText.innerText = '等待确认...';
                statusText.style.color = '#fff';
            }
        }

        // 执行 AI 重写
        window.applyAiChanges = async function (btnElement) {
            if (!currentAiChanges) return;

            // Fix: 按钮状态更新与防抖
            const originalText = btnElement.innerText;
            btnElement.disabled = true;
            btnElement.innerText = '修改中...';
            statusText.innerText = '正在生成代码...';
            statusText.style.color = '#2196f3';

            try {
                const response = await fetch('/api/modify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        currentHtml: window.currentHtmlContent,
                        acceptedChanges: currentAiChanges
                    })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();

                saveVersion('AI修改前备份', window.currentHtmlContent);
                setContent(data.newHtml); // 更新状态并刷新预览

                addMessage("✅ 简历修改已完成，并在中间大屏实时刷新。您可以直接预览最终效果！", true);
                currentAiChanges = null;

            } catch (error) {
                console.error("Modify Error:", error);
                addMessage("❌ 应用修改失败。", true);
            } finally {
                // Fix: 重置按钮状态
                btnElement.innerText = originalText;
                btnElement.disabled = false;
                statusText.innerText = '空闲';
                statusText.style.color = '#4caf50';
            }
        }

        // --- 4. 历史版本与导出 ---
        function saveVersion(customName = null, content = null) {
            const htmlToSave = content || window.currentHtmlContent;
            const name = customName || `版本 - ${new Date().toLocaleTimeString()}`;
            const versionData = {
                id: 'v_' + new Date().getTime(),
                name: name,
                time: new Date().toISOString(),
                html: htmlToSave
            };

            let versions = JSON.parse(localStorage.getItem('cv_versions') || '[]');
            versions.push(versionData);
            if (versions.length > 20) versions.shift();

            localStorage.setItem('cv_versions', JSON.stringify(versions));
            if (!customName && !content) alert(`已保存: ${name}`);
            loadVersionsMap();
        }

        function loadVersionsMap() {
            const select = document.getElementById('versionSelect');
            while (select.options.length > 1) select.remove(1);

            const versions = JSON.parse(localStorage.getItem('cv_versions') || '[]');
            [...versions].reverse().forEach(v => {
                const option = document.createElement('option');
                option.value = v.id;
                option.text = v.name;
                select.appendChild(option);
            });
        }

        document.getElementById('versionSelect').addEventListener('change', function (e) {
            const val = e.target.value;
            if (val === 'current') return;

            const versions = JSON.parse(localStorage.getItem('cv_versions') || '[]');
            const targetVersion = versions.find(v => v.id === val);
            if (targetVersion) {
                localStorage.setItem('cv_temp_draft', window.currentHtmlContent);
                setContent(targetVersion.html);
                addMessage(`已回滚至版本: **${targetVersion.name}**`, true);
            }
            e.target.value = 'current';
        });

        window.exportHtml = function () {
            const blob = new Blob([window.currentHtmlContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `简历_${new Date().toISOString().slice(0, 10)}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
